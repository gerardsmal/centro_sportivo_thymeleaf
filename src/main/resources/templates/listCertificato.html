<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<title>Certificato</title>
</head>
<body>
	<nav th:insert="~{fragments/navigation :: block-navigation(${titolo})}"></nav>


	<div class="conatainer mt-3" align="center">
	<div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>
	<form class="form.content" th:action="@{saveCertificato}" th:object="${certificato}" 
				method="post"
				style="width:50%; margin:auto;">
		<input type="hidden" th:field="*{id}">
		<input type="hidden" th:field="*{socioID}">
	
	
	
		<table class="table table-secondary m-25">
			<tr>
				<td><label class="form-label">Tipo</label></td>
				<td>
					<select class="form-select" th:field="*{tipo}">
						<option value=false>Normale</option>
						<option value=true>Agonistico</option>				
					</select>
				</td>
			</tr>
			<tr>
				<td><label class="form-label">Data Certificato</label></td>
				<td><input type="date" th:field="*{dataCertificatoString}" name="dataCertificato" placeholder="gg/mm/aaaa" required></td>
			</tr>
		</table>
		<div clas="mt-4" align="center">
			<button type="submit" class="btn btn-primary">Registra Cetificato</button>
<!-- 
			<a  th:if="*{id} != null" class="btn btn-danger"
					th:href="@{removeSocio(id=*{id})}"
					onclick="return confirm('Sei sicuro di voler rimuovere questo socio?')">
					<span>Rimuovere socio</span>
			
			</a>
 -->			
		</div>		
	</form>	
	</div>
</body>
</html>
