<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<title>Gestione attivita</title>
</head>
<body>
	<nav th:insert="~{fragments/navigation :: block-navigation('Aggiungere un attività')}"></nav>


	<div class="container mt-3" align="center">
	
		<form class="form.content" th:action="@{saveAttivitaAbbonamento}" th:object="${param}" 
				method="post"
				style="width:50%; margin:auto;">
			
			<select class="form-select" th:field="*{id}">
				<option value="" selected>Selezionare un attività</option>
				<option th:each="att : ${listAttivita}"
					th:value="${att.id}"
					th:text="${att.description}">			
				</option>					
			</select>
			<input type="hidden" th:field="*{socioID}" />
			<input type="hidden" th:field="*{abbonamentID}" />
		
			<div align="center">
				<button type="submit" class="btn btn-info mt-5">Aggiungi attività</button>
			</div>	
		
		</form>
	
	</div>
</body>
</html>
